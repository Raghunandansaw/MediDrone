<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediDrone - Home</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    /* Specific Hero Styles */
    .hero {
      position: relative;
      text-align: center;
      padding: 80px 20px 60px;
      overflow: hidden;
      /* Background is handled by body gradient, but we can add a subtle pattern here if needed */
    }

    .hero h1 {
      color: var(--primary);
      font-size: 42px;
      /* Bigger for desktop */
      margin-bottom: 20px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .hero p {
      font-size: 18px;
      color: var(--text-gray);
      max-width: 600px;
      margin: auto;
      line-height: 1.6;
    }

    /* Drone Animation */
    .drone-wrap {
      position: absolute;
      left: -15vw;
      top: 20px;
      width: 250px;
      opacity: 0.98;
      pointer-events: none;
      z-index: 0;
    }

    .drone-path {
      animation: flyX 15s linear infinite alternate;
      will-change: transform;
    }

    .drone-svg {
      animation: bob 3s ease-in-out infinite;
      will-change: transform;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
    }

    @keyframes flyX {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(110vw);
      }
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    .propeller {
      transform-origin: center;
    }

    /* Search Bar Enhanced */
    .search-bar {
      display: flex;
      justify-content: center;
      margin: -25px auto 40px;
      /* Overlap hero slightly */
      position: relative;
      z-index: 10;
      max-width: 600px;
      padding: 0 20px;
    }

    .search-bar input {
      border-radius: 50px 0 0 50px;
      padding: 16px 24px;
      font-size: 16px;
      border: none;
      box-shadow: 0 10px 30px rgba(255, 123, 0, 0.15);
    }

    .search-bar button {
      padding: 12px 30px;
      background: var(--primary);
      color: white;
      font-weight: 700;
      border-radius: 0 50px 50px 0;
      box-shadow: 0 10px 30px rgba(255, 123, 0, 0.15);
      font-size: 16px;
    }

    .search-bar button:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    /* Medicines Grid - Defer to style.css for main layout, keep specific padding/max-width if needed or remove if style.css handles it */
    .medicines {
      /* defer grid columns to style.css to ensure 3-column match */
      padding: 20px 5%;
      max-width: 1400px;
      margin: auto;
    }

    /* Ensure card images match dashboard */
    .card img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      margin-bottom: 15px;
      padding: 10px;
    }

    /* Mobile adjustments overriding main rules if needed */
    @media (max-width: 768px) {
      .hero {
        padding: 40px 20px;
      }

      .hero h1 {
        font-size: 28px;
      }

      .search-bar {
        flex-direction: column;
        gap: 10px;
        max-width: 100%;
        margin: 10px 0 30px;
      }

      .search-bar input {
        border-radius: 12px;
        width: 100%;
      }

      .search-bar button {
        border-radius: 12px;
        width: 100%;
      }

      .drone-wrap {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">

      MediDrone
    </div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="signup.html">Signup</a></li>
    </ul>
    <a href="cart.html" class="cart-btn">🛒 Cart</a>
  </nav>

  <div class="main-content">
    <!-- Hero -->
    <section class="hero">
      <div class="drone-wrap">
        <div class="drone-path">
          <svg class="drone-svg" viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg">
            <!-- Shadow -->
            <ellipse cx="120" cy="120" rx="60" ry="10" fill="rgba(0,0,0,0.08)" />
            <!-- Arms (4) from body to each rotor -->
            <g stroke="%23ff7b00" stroke-width="3" fill="none">
              <line x1="120" y1="65" x2="60" y2="34" />
              <line x1="120" y1="65" x2="60" y2="86" />
              <line x1="120" y1="65" x2="180" y2="34" />
              <line x1="120" y1="65" x2="180" y2="86" />
            </g>
            <!-- Body -->
            <rect x="95" y="50" width="50" height="30" rx="8" fill="%23ffffff" stroke="%23ff7b00" stroke-width="3" />
            <!-- Camera -->
            <circle cx="120" cy="66" r="6" fill="%23ffd60a" stroke="%23ff7b00" stroke-width="2" />
            <!-- Propeller posts -->
            <g stroke="%23ff7b00" stroke-width="3">
              <line x1="60" y1="40" x2="60" y2="28" />
              <line x1="60" y1="92" x2="60" y2="80" />
              <line x1="180" y1="40" x2="180" y2="28" />
              <line x1="180" y1="92" x2="180" y2="80" />
            </g>
            <!-- Propellers (top/bottom left/right) -->
            <g fill="%23ffffff" stroke="%23ff7b00" stroke-width="2">
              <g class="propeller">
                <ellipse cx="60" cy="34" rx="16" ry="4" />
              </g>
              <g class="propeller">
                <ellipse cx="60" cy="86" rx="16" ry="4" />
              </g>
              <g class="propeller">
                <ellipse cx="180" cy="34" rx="16" ry="4" />
              </g>
              <g class="propeller">
                <ellipse cx="180" cy="86" rx="16" ry="4" />
              </g>
            </g>
            <!-- Package -->
            <g>
              <line x1="120" y1="80" x2="120" y2="94" stroke="%23ff7b00" stroke-width="2" />
              <rect x="108" y="94" width="24" height="16" rx="3" fill="%23ffe8c7" stroke="%23ff7b00" stroke-width="2" />
              <line x1="108" y1="102" x2="132" y2="102" stroke="%23ff7b00" stroke-width="2" />
            </g>
          </svg>
        </div>
      </div>
      <h1>Medicines Delivered by Drones 🚁</h1>
      <p>Experience the fastest and safest medicine delivery with MediDrone.
        Order from anywhere, and get your medicines dropped at your doorstep by drones.</p>
    </section>

    <!-- Search -->
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search for medicines...">
      <button id="searchBtn">Search</button>
    </div>

    <!-- Medicines -->
    <section id="productsGrid" class="medicines"></section>
  </div>

  <!-- Footer -->
  <footer>
    © 2025 MediDrone. Delivering Health with Drones 🚁
  </footer>



  <!-- Products + Cart Script -->
  <script type="module">
    import { PRODUCTS } from './js/products.js';
    // products are loaded from shared module below

    function getCart() { return JSON.parse(localStorage.getItem('cart') || '[]'); }
    function setCart(c) { localStorage.setItem('cart', JSON.stringify(c)); }

    function addToCart(product) {
      const cart = getCart();
      const existing = cart.find(i => i.id === product.id);
      if (existing) {
        existing.qty = Number(existing.qty || 1) + 1;
      } else {
        cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 });
      }
      setCart(cart);
      const btn = document.querySelector(`[data-id="${product.id}"]`);
      if (btn) { btn.textContent = 'Added ✓'; setTimeout(() => { btn.textContent = 'Add to Cart'; }, 900); }
    }

    const FALLBACK_SVG = 'data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22 viewBox=%220 0 120 120%22%3E%3Crect width=%22120%22 height=%22120%22 fill=%22%23fff6e5%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Poppins,Arial%22 font-size=%2212%22 fill=%22%23ff7b00%22%3ENo Image%3C/text%3E%3C/svg%3E';

    function renderProducts(list) {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = list.map(p => `
        <div class="card">
          <a href="product.html?id=${p.id}"><img src="${p.image}" alt="${p.name}" onerror="this.onerror=null;this.src='${FALLBACK_SVG}';"></a>
          <h3>${p.name}</h3>
          <p class="tag">${p.tag}</p>
          <span class="price">₹${Number(p.price).toFixed(2)}</span>
          <div class="card-actions">
            <a class="btn-outline" href="product.html?id=${p.id}">View</a>
            <button class="add-btn" data-id="${p.id}">Add to Cart</button>
          </div>
        </div>
      `).join('');
      // Attach onclick properly (alternate to inline workaround)
      list.forEach(p => {
        const el = document.querySelector(`[data-id="${p.id}"]`);
        if (el) el.onclick = () => addToCart(p);
      });
    }

    function applySearch() {
      const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
      if (!q) { renderProducts(PRODUCTS); return; }
      const filtered = PRODUCTS.filter(p => `${p.name} ${p.tag}`.toLowerCase().includes(q));
      renderProducts(filtered);
    }

    document.getElementById('searchBtn').addEventListener('click', applySearch);
    document.getElementById('searchInput').addEventListener('input', applySearch);
    renderProducts(PRODUCTS);
  </script>

  <!-- Auth-aware Navbar Script -->
  <script type="module">
    import { auth } from './js/firebase.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    function setLoggedInNavbar(user) {
      const navUl = document.querySelector('nav ul');
      if (!navUl) return;
      navUl.innerHTML = `
        <li><a href="index.html">Home</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="#" id="logoutLink">Logout</a></li>
      `;
      const link = document.getElementById('logoutLink');
      if (link) link.onclick = (e) => { e.preventDefault(); signOut(auth).then(() => location.href = 'login.html'); };
    }

    function setLoggedOutNavbar() {
      const navUl = document.querySelector('nav ul');
      if (!navUl) return;
      navUl.innerHTML = `
        <li><a href="index.html">Home</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="signup.html">Signup</a></li>
      `;
    }

    onAuthStateChanged(auth, (user) => {
      if (user) setLoggedInNavbar(user); else setLoggedOutNavbar();
    });
  </script>

</body>

</html>
