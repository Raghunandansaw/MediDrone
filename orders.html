<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediDrone - My Orders</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #fffdf6;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: linear-gradient(90deg, #ff7b00, #ffd60a);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav .logo {
      font-size: 22px;
      font-weight: bold;
    }

    nav ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      margin: 0 12px;
    }

    nav ul li a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
    }

    .cart-btn {
      background: #fff;
      color: #ff7b00;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
    }

    .container {
      max-width: 1000px;
      margin: 24px auto;
      padding: 0 15px;
      flex: 1;
    }

    #orders-root {
      width: 100%;
      max-width: 100%;
    }

    h2 {
      color: #ff7b00;
      margin: 6px 0 16px;
    }

    .order {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
      padding: 20px;
      margin-bottom: 16px;
      max-width: 100%;
      width: 100%;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .order-id {
      font-weight: bold;
      color: #ff7b00;
      font-size: 16px;
    }

    .order-date {
      color: #666;
      font-size: 14px;
    }

    .order-status {
      font-weight: 700;
      color: #e36400;
      padding: 4px 8px;
      background: #fff3e0;
      border-radius: 6px;
    }

    .order-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 12px;
    }

    .detail-group h4 {
      color: #ff7b00;
      margin: 0 0 8px;
      font-size: 14px;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
      font-size: 14px;
    }

    .detail-label {
      color: #666;
    }

    .detail-value {
      color: #333;
      font-weight: 500;
    }

    .order-items {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }

    .order-items h4 {
      color: #ff7b00;
      margin: 0 0 8px;
      font-size: 14px;
    }

    .item-list {
      font-size: 14px;
      color: #555;
      line-height: 1.4;
    }

    .order-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status {
      font-weight: 700;
      color: #e36400;
    }

    .items {
      margin-top: 8px;
      font-size: 14px;
      color: #555;
    }

    .empty {
      text-align: center;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    .view-details-btn {
      background: #17a2b8;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .send-otp-btn {
      background: #28a745;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .otp-verify-btn {
      background: #ffc107;
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .download-invoice-btn {
      background: #6f42c1;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: #fff;
      margin: 5% auto;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .close {
      color: #aaa;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    .close:hover {
      color: #000;
    }

    .detail-section {
      margin-bottom: 16px;
    }

    .detail-section h4 {
      color: #ff7b00;
      margin: 0 0 8px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
    }

    .detail-label {
      font-weight: 600;
      color: #555;
    }

    .detail-value {
      color: #333;
    }

    .items-list {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 8px;
      margin-top: 8px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      nav {
        padding: 10px 15px;
      }

      nav .logo {
        font-size: 18px;
      }

      nav ul {
        display: none;
      }

      .container {
        padding: 0 10px;
        max-width: 100%;
      }

      .order {
        padding: 12px;
        margin-bottom: 12px;
        width: 100%;
        max-width: 100%;
      }

      .order-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .order-details {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .order-actions {
        flex-direction: column;
      }

      .order-actions button {
        width: 100%;
        margin: 2px 0;
      }

      .modal-content {
        width: 95%;
        margin: 10% auto;
        padding: 15px;
      }

      .detail-row {
        flex-direction: column;
        gap: 4px;
      }

      .detail-label {
        font-weight: 600;
      }

      .detail-value {
        margin-left: 0;
      }

      footer {
        padding: 10px;
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 0 8px;
        max-width: 100%;
      }

      .order {
        padding: 10px;
        width: 100%;
        max-width: 100%;
      }

      .order-id {
        font-size: 14px;
      }

      .order-date {
        font-size: 12px;
      }

      .detail-item {
        font-size: 12px;
      }

      .item-list {
        font-size: 12px;
      }

      .order-actions button {
        padding: 8px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <nav>
    <div class="logo">MediDrone</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
    <a href="cart.html" class="cart-btn">🛒 Cart</a>
  </nav>

  <div class="container">
    <h2>My Orders</h2>
    <div id="orders-root"></div>
  </div>

  <!-- Order Details Modal -->
  <div id="orderModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Order Details</h3>
        <span class="close">&times;</span>
      </div>
      <div id="orderDetails"></div>
    </div>
  </div>

  <!-- User OTP Verification Modal -->
  <div id="userOtpModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Verify Delivery</h3>
        <span class="close-user-otp">&times;</span>
      </div>
      <div id="userOtpDetails">
        <p>Your drone has reached your location! Please enter the 6-digit OTP sent to your email to verify delivery:</p>
        <input type="text" id="userOtpInput" placeholder="Enter OTP" maxlength="6"
          style="width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:8px; font-size:16px; text-align:center;">
        <div style="display:flex; gap:10px; margin-top:15px;">
          <button id="userVerifyOTPBtn"
            style="flex:1; background:#28a745; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">Verify
            OTP</button>
          <button id="userResendOTPBtn"
            style="flex:1; background:#ffc107; color:black; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">Resend
            OTP</button>
        </div>
        <div id="userOtpFeedback" style="margin-top:10px; text-align:center;"></div>
      </div>
    </div>
  </div>

  <footer>
    © 2025 MediDrone. Delivering Health with Drones 🚁
  </footer>

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script type="module">
    import { auth, db } from './js/firebase.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { collection, query, where, orderBy, onSnapshot, getDoc, doc, updateDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const root = document.getElementById('orders-root');

    // Initialize EmailJS
    emailjs.init(''); // Your EmailJS public key

    function fmt(ts) { try { return ts?.toDate().toLocaleString('en-IN', { hour12: true }); } catch { return '-'; } }

    // Generate random 6-digit OTP
    function generateOTP() {
      return Math.floor(100000 + Math.random() * 900000).toString();
    }

    // Send OTP for user verification
    async function sendOTPForUser(orderId, order) {
      console.log('sendOTPForUser called with:', { orderId, order });

      if (!order || !order.userEmail) {
        console.error('No email found in order:', order);
        alert('❌ No email found for this order');
        return;
      }

      const otp = generateOTP();
      console.log('Generated OTP:', otp);

      try {
        // Store OTP in Firestore with expiration (5 minutes)
        const otpData = {
          otp: otp,
          orderId: orderId,
          email: order.userEmail,
          expiresAt: new Date(Date.now() + 5 * 60 * 1000), // 5 minutes from now
          createdAt: new Date()
        };

        console.log('Storing OTP data:', otpData);
        await setDoc(doc(db, 'otp_verifications', orderId), otpData);

        // Send email using EmailJS
        const emailParams = {
          email: order.userEmail,
          to_name: order.fullName || 'Customer',
          otp: otp,
          order_number: orderId
        };

        console.log('Sending email with params:', emailParams);
        console.log('EmailJS service:', '');
        console.log('EmailJS template:', '');

        const result = await emailjs.send('', '', emailParams);
        console.log('EmailJS send result:', result);

        alert(`✅ OTP sent to ${order.userEmail}. Valid for 5 minutes.`);

      } catch (error) {
        console.error('OTP sending error:', error);
        console.error('Error details:', {
          message: error.message,
          status: error.status,
          text: error.text
        });
        alert('❌ Failed to send OTP: ' + error.message);
      }
    }

    function render(orders) {
      if (!orders.length) {
        root.innerHTML = `<div class="empty">No orders yet. <a href='index.html'>Start shopping</a>.</div>`;
        return;
      }

      // Sort orders by creation date (latest first)
      const sortedOrders = orders.sort((a, b) => {
        const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt);
        const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt);
        return dateB - dateA;
      });

      root.innerHTML = sortedOrders.map(o => `
        <div class="order" style="${o.status === 'Cancelled' ? (o.cancellationDetails?.refundEligible ? 'border-left: 4px solid #28a745; background-color: #f8fff8;' : 'border-left: 4px solid #dc3545; background-color: #fff5f5;') : ''}">
          <div class="order-header">
            <div>
              <div class="order-id">Order #${o.id}</div>
              <div class="order-date">Placed on ${fmt(o.createdAt)}</div>
              ${o.status === 'Delivered' && o.deliveredAt ? `
              <div class="delivery-date" style="color:#28a745; font-size:12px; margin-top:2px;">
                Delivered on ${o.deliveryDate || fmt(o.deliveredAt)} at ${o.deliveryTime || 'N/A'}
              </div>
              ` : ''}
              ${o.status === 'Cancelled' && o.cancelledAt ? `
              <div class="cancellation-date" style="color:#dc3545; font-size:12px; margin-top:2px;">
                Cancelled on ${fmt(o.cancelledAt)}
              </div>
              ` : ''}
            </div>
            <div class="order-status" style="${o.status === 'Cancelled' ? (o.cancellationDetails?.refundEligible ? 'color:#28a745; background-color:#d4edda;' : 'color:#dc3545; background-color:#f8d7da;') : ''}">${o.status}${(o.status === 'Reached' || o.status === 'Delivered') && o.verified ? ' ✓' : ''}${o.status === 'Cancelled' && o.cancellationDetails ? ` - ${o.cancellationDetails.reason}` : ''}${o.status === 'Cancelled' && o.cancellationDetails?.refundEligible ? ' 💰' : ''}</div>
          </div>
          
          <div class="order-details">
            <div class="detail-group">
              <h4>Payment Details</h4>
              <div class="detail-item">
                <span class="detail-label">Status:</span>
                <span class="detail-value">${o.paymentVerified ? '<span style="color:#28a745; font-weight:bold;">✓ Verified</span>' : '<span style="color:#dc3545; font-weight:bold;">✗ Not Verified</span>'}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">Total Amount:</span>
                <span class="detail-value">₹${(o.amounts?.total || 0).toFixed(2)}</span>
              </div>
            </div>
            
            <div class="detail-group">
              <h4>Delivery Details</h4>
              <div class="detail-item">
                <span class="detail-label">Name:</span>
                <span class="detail-value">${o.fullName || 'N/A'}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">Phone:</span>
                <span class="detail-value">${o.phone || 'N/A'}</span>
              </div>
            </div>
          </div>
          
          <div class="order-items">
            <h4>Items Ordered</h4>
            <div class="item-list">
              ${o.items.map(i => `${i.name} x ${i.qty}`).join(', ')}
            </div>
          </div>
          
          <div class="order-actions">
            <button class="view-details-btn" data-order-id="${o.id}" data-order-data='${JSON.stringify(o).replace(/'/g, "&#39;")}'>
              View Details
            </button>
            ${o.status === 'Delivered' ? `<button class="download-invoice-btn" data-order-id="${o.id}" data-order-data='${JSON.stringify(o).replace(/'/g, "&#39;")}'>
              📄 Download Invoice
            </button>` : ''}
            ${o.status === 'Reached' && !o.verified ?
          `<button class="send-otp-btn" data-order-id="${o.id}" data-order-data='${JSON.stringify(o).replace(/'/g, "&#39;")}'>
                Send OTP
              </button>
              <button class="otp-verify-btn" data-order-id="${o.id}" data-order-data='${JSON.stringify(o).replace(/'/g, "&#39;")}'>
                Enter OTP
              </button>` :
          ''
        }
          </div>
        </div>
      `).join('');

      // Add event listeners to view details buttons
      document.querySelectorAll('.view-details-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          const orderId = this.getAttribute('data-order-id');
          const orderData = JSON.parse(this.getAttribute('data-order-data'));
          showOrderDetails(orderId, orderData);
        });
      });

      // Add event listeners to send OTP buttons
      document.querySelectorAll('.send-otp-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          const orderId = this.getAttribute('data-order-id');
          const orderData = JSON.parse(this.getAttribute('data-order-data'));
          sendOTPForUser(orderId, orderData);
        });
      });

      // Add event listeners to OTP verify buttons
      document.querySelectorAll('.otp-verify-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          const orderId = this.getAttribute('data-order-id');
          const orderData = JSON.parse(this.getAttribute('data-order-data'));
          showUserOTPVerificationModal(orderId, orderData);
        });
      });

      // Add event listeners to download invoice buttons
      document.querySelectorAll('.download-invoice-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          const orderId = this.getAttribute('data-order-id');
          const orderData = JSON.parse(this.getAttribute('data-order-data'));
          generateAndDownloadInvoice(orderId, orderData);
        });
      });

    }

    // Modal functions
    function showOrderDetails(orderId, order) {
      if (!order) return;

      // Format date properly for modal display
      function formatDateForModal(ts) {
        try {
          if (ts && typeof ts === 'object' && ts.seconds) {
            // Firestore timestamp object
            return new Date(ts.seconds * 1000).toLocaleString('en-IN', { hour12: true });
          } else if (ts && ts.toDate) {
            // Firestore timestamp with toDate method
            return ts.toDate().toLocaleString('en-IN', { hour12: true });
          } else if (ts) {
            // Regular date
            return new Date(ts).toLocaleString('en-IN', { hour12: true });
          }
          return '-';
        } catch (e) {
          return '-';
        }
      }

      const detailsHtml = `
        <div class="detail-section">
          <h4>Order Information</h4>
          <div class="detail-row">
            <span class="detail-label">Order ID:</span>
            <span class="detail-value">${orderId}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Status:</span>
            <span class="detail-value" style="color:#e36400; font-weight:700;">${order.status || 'Pending'}${(order.status === 'Reached' || order.status === 'Delivered') && order.verified ? ' ✓ Verified' : ''}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Order Date:</span>
            <span class="detail-value">${formatDateForModal(order.createdAt)}</span>
          </div>
          ${order.status === 'Delivered' && order.deliveredAt ? `
          <div class="detail-row">
            <span class="detail-label">Delivery Date:</span>
            <span class="detail-value">${order.deliveryDate || formatDateForModal(order.deliveredAt)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Delivery Time:</span>
            <span class="detail-value">${order.deliveryTime || formatDateForModal(order.deliveredAt)}</span>
          </div>
          ` : ''}
          <div class="detail-row">
            <span class="detail-label">Payment Method:</span>
            <span class="detail-value">${order.payment || 'Cash on Delivery'}</span>
          </div>
          ${order.status === 'Cancelled' && order.cancellationDetails ? `
          <div class="detail-row">
            <span class="detail-label">Cancellation Reason:</span>
            <span class="detail-value" style="color:#dc3545; font-weight:bold;">${order.cancellationDetails.reason}</span>
          </div>
          ${order.cancellationDetails.notes ? `
          <div class="detail-row">
            <span class="detail-label">Cancellation Notes:</span>
            <span class="detail-value">${order.cancellationDetails.notes}</span>
          </div>
          ` : ''}
          <div class="detail-row">
            <span class="detail-label">Cancelled At:</span>
            <span class="detail-value">${formatDateForModal(order.cancelledAt)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Refund Status:</span>
            <span class="detail-value" style="color:${order.cancellationDetails.refundEligible ? '#28a745' : '#dc3545'}; font-weight:bold;">
              ${order.cancellationDetails.refundEligible ? '✅ Refund will be processed within 3 business days' : '❌ No refund applicable'}
            </span>
          </div>
          ` : ''}
        </div>

        ${order.payment === 'UPI' && order.paymentDetails ? `
        <div class="detail-section">
          <h4>Payment Details</h4>
          <div class="detail-row">
            <span class="detail-label">UPI ID:</span>
            <span class="detail-value">${order.paymentDetails.upiId || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">UTR Number:</span>
            <span class="detail-value">${order.paymentDetails.utrNumber || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Payment Date:</span>
            <span class="detail-value">${order.paymentDetails.paymentDate || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Payment Time:</span>
            <span class="detail-value">${order.paymentDetails.paymentTime || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Payee Name:</span>
            <span class="detail-value">${order.paymentDetails.payeeName || 'N/A'}</span>
          </div>
        </div>
        ` : ''}

        <div class="detail-section">
          <h4>Delivery Information</h4>
          <div class="detail-row">
            <span class="detail-label">Name:</span>
            <span class="detail-value">${order.fullName || '-'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Phone:</span>
            <span class="detail-value">${order.phone || '-'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Address:</span>
            <span class="detail-value">${order.address || 'No address provided'}</span>
          </div>
          ${order.latitude && order.longitude ? `
            <div class="detail-row">
              <span class="detail-label">Coordinates:</span>
              <span class="detail-value">${order.latitude.toFixed(6)}, ${order.longitude.toFixed(6)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Map Link:</span>
              <span class="detail-value">
                <a href="https://www.google.com/maps?q=${order.latitude},${order.longitude}" target="_blank" style="color:#17a2b8; text-decoration:none;">
                  📍 View on Google Maps
                </a>
              </span>
            </div>
          ` : ''}
        </div>

        <div class="detail-section">
          <h4>Order Items</h4>
          <div class="items-list">
            ${order.items.map(item => `
              <div class="item-row">
                <span>${item.name} x ${item.qty}</span>
                <span>₹${(Number(item.price) * Number(item.qty)).toFixed(2)}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="detail-section">
          <h4>Order Summary</h4>
          <div class="detail-row">
            <span class="detail-label">Items Subtotal:</span>
            <span class="detail-value">₹${(order.amounts?.subtotal || 0).toFixed(2)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Delivery Fee:</span>
            <span class="detail-value">₹${(order.amounts?.delivery || 0).toFixed(2)}</span>
          </div>
          <div class="detail-row" style="border-top:1px solid #eee; padding-top:8px; font-weight:700; font-size:16px;">
            <span class="detail-label">Total Amount:</span>
            <span class="detail-value" style="color:#e36400;">₹${(order.amounts?.total || 0).toFixed(2)}</span>
          </div>
        </div>
      `;

      document.getElementById('orderDetails').innerHTML = detailsHtml;
      document.getElementById('orderModal').style.display = 'block';
    }

    // Show user OTP verification modal
    function showUserOTPVerificationModal(orderId, order) {
      document.getElementById('userOtpModal').style.display = 'block';
      document.getElementById('userOtpInput').value = '';
      document.getElementById('userOtpFeedback').textContent = '';

      // Set up event listeners
      const verifyBtn = document.getElementById('userVerifyOTPBtn');
      const resendBtn = document.getElementById('userResendOTPBtn');
      const otpInput = document.getElementById('userOtpInput');

      // Verify OTP
      verifyBtn.onclick = async () => {
        const enteredOTP = otpInput.value.trim();
        if (enteredOTP.length !== 6) {
          document.getElementById('userOtpFeedback').textContent = 'Please enter a 6-digit OTP';
          document.getElementById('userOtpFeedback').style.color = '#dc3545';
          return;
        }

        try {
          // Get stored OTP from Firestore
          const otpDoc = await getDoc(doc(db, 'otp_verifications', orderId));
          if (!otpDoc.exists()) {
            document.getElementById('userOtpFeedback').textContent = 'OTP not found or expired';
            document.getElementById('userOtpFeedback').style.color = '#dc3545';
            return;
          }

          const otpData = otpDoc.data();
          const now = new Date();
          const expiresAt = otpData.expiresAt.toDate();

          if (now > expiresAt) {
            document.getElementById('userOtpFeedback').textContent = 'OTP has expired. Please resend.';
            document.getElementById('userOtpFeedback').style.color = '#dc3545';
            return;
          }

          if (enteredOTP === otpData.otp) {
            // OTP is correct - mark order as verified
            await updateDoc(doc(db, 'orders', orderId), { verified: true });

            document.getElementById('userOtpFeedback').textContent = '✅ OTP verified successfully!';
            document.getElementById('userOtpFeedback').style.color = '#28a745';

            // Close modal after 2 seconds and refresh the page
            setTimeout(() => {
              document.getElementById('userOtpModal').style.display = 'none';
              location.reload(); // Refresh to show updated status
            }, 2000);

          } else {
            document.getElementById('userOtpFeedback').textContent = '❌ Invalid OTP. Please try again.';
            document.getElementById('userOtpFeedback').style.color = '#dc3545';
          }

        } catch (error) {
          console.error('OTP verification error:', error);
          document.getElementById('userOtpFeedback').textContent = 'Error verifying OTP: ' + error.message;
          document.getElementById('userOtpFeedback').style.color = '#dc3545';
        }
      };

      // Resend OTP
      resendBtn.onclick = async () => {
        document.getElementById('userOtpFeedback').textContent = 'Sending new OTP...';
        document.getElementById('userOtpFeedback').style.color = '#777';

        try {
          await sendOTPForUser(orderId, order);
          document.getElementById('userOtpFeedback').textContent = '✅ OTP sent successfully!';
          document.getElementById('userOtpFeedback').style.color = '#28a745';
        } catch (error) {
          // sendOTPForUser handles its own alerts/errors mostly, but just in case
        }
      };

      // Allow Enter key to verify
      otpInput.onkeypress = (e) => {
        if (e.key === 'Enter') {
          verifyBtn.click();
        }
      };
    }




    // Generate and Download Invoice PDF
    function generateAndDownloadInvoice(orderId, order) {
      try {
        console.log('Generating invoice PDF for order:', orderId, order);

        if (!order) {
          alert('Order data not found. Please try again.');
          return;
        }

        // Create new PDF document
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Set up colors
        const primaryColor = [255, 123, 0]; // Orange #ff7b00
        const darkColor = [51, 51, 51]; // Dark #333
        const lightGray = [245, 245, 245]; // Light gray

        // Helper function to format date
        function formatDate(date) {
          if (!date) return 'N/A';
          try {
            const d = date.toDate ? date.toDate() : new Date(date);
            return d.toLocaleDateString('en-IN');
          } catch (e) {
            return 'N/A';
          }
        }

        // Helper function to format date and time
        function formatDateTime(date) {
          if (!date) return 'N/A';
          try {
            const d = date.toDate ? date.toDate() : new Date(date);
            return d.toLocaleString('en-IN', { hour12: true });
          } catch (e) {
            return 'N/A';
          }
        }

        // Helper function to format currency
        function formatCurrency(amount) {
          const numAmount = Number(amount);
          if (isNaN(numAmount)) return 'Rs. 0.00';
          return `Rs. ${numAmount.toFixed(2)}`;
        }

        let yPosition = 20;

        // Header
        doc.setFillColor(...primaryColor);
        doc.rect(0, 0, 210, 30, 'F');

        doc.setTextColor(255, 255, 255);
        doc.setFontSize(24);
        doc.setFont('helvetica', 'bold');
        doc.text('MediDrone', 20, 20);

        doc.setFontSize(10);
        doc.text('Delivering Health with Drones ', 20, 26);

        yPosition = 50;

        // Invoice Title
        doc.setTextColor(...darkColor);
        doc.setFontSize(20);
        doc.setFont('helvetica', 'bold');
        doc.text('INVOICE', 20, yPosition);

        yPosition += 20;

        // Invoice Details Section
        doc.setFontSize(12);
        doc.setFont('helvetica', 'bold');
        doc.text('Invoice Details', 20, yPosition);

        yPosition += 10;
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);

        const invoiceDetails = [
          ['Invoice No:', orderId],
          ['Invoice Date:', new Date().toLocaleDateString('en-IN')],
          ['Order Date:', formatDate(order.createdAt)],
          ['Order Time:', formatDateTime(order.createdAt)],
          ['Delivery Date:', order.deliveryDate || formatDate(order.deliveredAt) || 'N/A'],
          ['Delivery Time:', order.deliveryTime || (order.deliveredAt ? formatDateTime(order.deliveredAt) : 'N/A')],
          ['Status:', order.status || 'Pending'],
          ['Payment:', order.paymentVerified ? 'Verified' : 'Pending']
        ];

        invoiceDetails.forEach(([label, value]) => {
          doc.setFont('helvetica', 'bold');
          doc.text(label, 20, yPosition);
          doc.setFont('helvetica', 'normal');
          doc.text(value, 80, yPosition);
          yPosition += 6;
        });

        yPosition += 10;

        // Customer Details Section
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(12);
        doc.text('Customer Details', 20, yPosition);

        yPosition += 10;
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);

        const customerDetails = [
          ['Name:', order.fullName || 'N/A'],
          ['Email:', order.userEmail || 'N/A'],
          ['Phone:', order.phone || 'N/A'],
          ['Address:', order.address || 'N/A']
        ];

        customerDetails.forEach(([label, value]) => {
          doc.setFont('helvetica', 'bold');
          doc.text(label, 20, yPosition);
          doc.setFont('helvetica', 'normal');
          doc.text(value, 80, yPosition);
          yPosition += 6;
        });

        yPosition += 15;

        // Items Table Header
        doc.setFillColor(...lightGray);
        doc.rect(20, yPosition - 5, 170, 10, 'F');

        doc.setTextColor(...darkColor);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);

        doc.text('Item', 25, yPosition);
        doc.text('Qty', 100, yPosition);
        doc.text('Price', 130, yPosition);
        doc.text('Total', 170, yPosition);

        yPosition += 10;

        // Items Table Content
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...darkColor);

        if (order.items && Array.isArray(order.items)) {
          order.items.forEach(item => {
            const itemName = item.name || 'Unknown Item';
            const quantity = Number(item.qty) || 1;
            const price = Number(item.price) || 0;
            const total = price * quantity;

            // Debug logging
            console.log('Item data:', { name: itemName, qty: item.qty, price: item.price, calculatedTotal: total });

            doc.text(itemName, 25, yPosition);
            doc.text(quantity.toString(), 100, yPosition);
            doc.text(formatCurrency(price), 130, yPosition);
            doc.text(formatCurrency(total), 170, yPosition);

            yPosition += 8;
          });
        } else {
          doc.text('No items found', 25, yPosition);
          yPosition += 8;
        }

        yPosition += 10;

        // Total Section
        const subtotal = order.amounts?.subtotal || 0;
        const delivery = order.amounts?.delivery || 0;
        const tax = order.amounts?.tax || 0;
        const grandTotal = order.amounts?.total || 0;

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);

        doc.text('Subtotal:', 130, yPosition);
        doc.text(formatCurrency(subtotal), 170, yPosition);
        yPosition += 8;

        doc.text('Delivery Fee:', 130, yPosition);
        doc.text(formatCurrency(delivery), 170, yPosition);
        yPosition += 8;

        doc.text('Tax:', 130, yPosition);
        doc.text(formatCurrency(tax), 170, yPosition);
        yPosition += 8;

        // Grand Total
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(12);
        doc.text('Grand Total:', 130, yPosition);
        doc.text(formatCurrency(grandTotal), 170, yPosition);

        yPosition += 20;

        // Footer
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(100, 100, 100);

        doc.text('Thank you for choosing MediDrone!', 20, yPosition);
        yPosition += 5;
        doc.text('For any queries, contact us at explore.medidrone@gmail.com', 20, yPosition);
        yPosition += 5;
        doc.text('This is a computer-generated invoice.', 20, yPosition);

        // Download the PDF
        const fileName = `Invoice_${orderId}_${new Date().toISOString().split('T')[0]}.pdf`;
        doc.save(fileName);

        console.log('Invoice PDF generated and downloaded successfully');

      } catch (error) {
        console.error('Error generating invoice PDF:', error);
        alert('Error generating invoice PDF: ' + error.message);
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }

      // Try without orderBy first (in case of index issues)
      const qRef = query(
        collection(db, 'orders'),
        where('userId', '==', user.uid)
      );

      onSnapshot(qRef, (snap) => {
        const orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        console.log('Orders found:', orders.length, orders); // Debug log
        render(orders);
      }, (error) => {
        console.error('Firestore error:', error);
        root.innerHTML = `<div class="empty">Error loading orders: ${error.message}</div>`;
      });
    });
  </script>
  <script type="module">
    import { auth } from './js/firebase.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    function setLoggedInNavbar() {
      const navUl = document.querySelector('nav ul');
      if (!navUl) return;
      navUl.innerHTML = `
        <li><a href="index.html">Home</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="#" id="logoutLink">Logout</a></li>
      `;
      const link = document.getElementById('logoutLink');
      if (link) link.onclick = (e) => { e.preventDefault(); signOut(auth).then(() => location.href = 'login.html'); };
    }
    function setLoggedOutNavbar() {
      const navUl = document.querySelector('nav ul');
      if (!navUl) return;
      navUl.innerHTML = `
        <li><a href="index.html">Home</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="signup.html">Signup</a></li>
      `;
    }
    onAuthStateChanged(auth, (user) => { if (user) setLoggedInNavbar(); else setLoggedOutNavbar(); });
  </script>

  <script>
    // Close modal functionality
    document.querySelector('.close').onclick = function () {
      document.getElementById('orderModal').style.display = 'none';
    }

    document.querySelector('.close-user-otp').onclick = function () {
      document.getElementById('userOtpModal').style.display = 'none';

    window.onclick = function (event) {
      const orderModal = document.getElementById('orderModal');
      const userOtpModal = document.getElementById('userOtpModal');
      if (event.target === orderModal) {
        orderModal.style.display = 'none';
      }
      if (event.target === userOtpModal) {
